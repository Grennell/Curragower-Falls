name: Update Curragower Data
 
on:
  schedule:
    # Runs every 2 hours
    # Cron format: minute hour day month weekday
    - cron: '0 */2 * * *'
 
  # Also allows you to trigger it manually from the GitHub Actions tab
  workflow_dispatch:
 
jobs:
  update-data:
    runs-on: ubuntu-latest
 
    steps:
      # 1. Check out the repo so the script can read/write files
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
 
      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
 
      # 3. Install dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r python/requirements.txt
 
      # 4. Run the main pipeline script
      - name: Run data pipeline
        run: python python/main.py
 
      # 5. Commit and push the updated JSON files back to the repo
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
